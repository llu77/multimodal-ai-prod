# ============================================
# Docker Compose - Full Stack Deployment
# ============================================
version: "3.9"

services:
  # Main AI API Server
  multimodal-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ChromaDB (local vector store alternative to Supabase)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ./data/embeddings/chromadb:/chroma/chroma
    restart: unless-stopped
